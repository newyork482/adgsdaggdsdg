<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>who</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080500;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    body.fading {
      opacity: 0;
      transition: opacity 0.55s ease;
    }

    /* ── video background ── */
    .vid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .vid-bg video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center bottom;
      filter: brightness(0.85);
      pointer-events: none;
      background: transparent;
      -webkit-media-controls: none;
    }

    .vid-bg video::-webkit-media-controls,
    .vid-bg video::-webkit-media-controls-enclosure,
    .vid-bg video::-webkit-media-controls-overlay-play-button,
    .vid-bg video::-webkit-media-controls-start-playback-button,
    .vid-bg video::-webkit-media-controls-panel {
      display: none !important;
      -webkit-appearance: none;
      opacity: 0 !important;
    }

    /* fallback for browsers that can't play the video (Edge mobile, etc.) */
    .vid-bg {
      background: linear-gradient(180deg, #0a0a14 0%, #111828 40%, #1a2030 70%, #0e1520 100%);
    }

    /* ── overlays ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 55%, transparent 25%, rgba(4,2,1,0.6) 100%);
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(6,4,2,0.72) 0%,
        rgba(6,4,2,0.08) 30%,
        transparent 55%,
        transparent 100%
      );
    }

    /* ── rain canvas ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── back link ── */
    .back-link {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(210,170,95,0.65);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.2rem 0.15rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.4s;
    }

    .back-link:hover {
      color: rgba(235,195,125,0.92);
      border-bottom-color: rgba(210,170,95,0.38);
    }

    @keyframes fadeInUI { to { opacity: 1; } }

    /* ── title ── */
    .title {
      position: fixed;
      top: 1.35rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: rgba(215,178,112,0.45);
      white-space: nowrap;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.6s;
    }

    /* ── branding ── */
    .branding {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.26em;
      color: rgba(195,148,78,0.78);
      text-transform: lowercase;
      white-space: nowrap;
      user-select: none;
    }

    /* ── profile row ── */
    .wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .row {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: clamp(0.35rem, 1.5vw, 1.2rem);
      -webkit-flex-wrap: nowrap;
      flex-wrap: nowrap;
    }

    /* Safari: ensure all profiles are same width, no text blowout */
    .profile {
      opacity: 0;
      animation: profileIn 0.8s ease forwards;
      position: relative;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      width: clamp(48px, 13vw, 130px);
      min-width: clamp(48px, 13vw, 130px);
      max-width: clamp(48px, 13vw, 130px);
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      gap: 0.3rem;
    }

    .profile:nth-child(1) { animation-delay: 0.3s; }
    .profile:nth-child(2) { animation-delay: 0.42s; }
    .profile:nth-child(3) { animation-delay: 0.54s; }
    .profile:nth-child(4) { animation-delay: 0.66s; }
    .profile:nth-child(5) { animation-delay: 0.78s; }
    .profile:nth-child(6) { animation-delay: 0.90s; }
    .profile:nth-child(7) { animation-delay: 1.02s; }
    .profile:nth-child(8) { animation-delay: 1.14s; }

    @keyframes profileIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* progress */
    .popup-progress {

    .progress-track {

    /* controls */

    .ctrl-btn {

    /* volume */

    .vol-label {

      color: rgba(185,145,80,0.45);

    .vol-slider {

      flex: 1;

      border: none;

      height: 8px;
      border-radius: 50%;

    .vol-slider::-moz-range-thumb {

      height: 8px;
      border-radius: 50%;
      background: rgba(210,170,95,0.75);
      border: none;
      cursor: pointer;

    .avatar-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(225,188,120,0.95);
      text-align: center;
      margin-top: 0;

      user-select: text;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;

        align-items: start;
        gap: 0.6rem;

      }

      /* bottom sheet player on mobile */
      .player-popup {

    /* ── phone landscape (all phones up to ~930px wide in landscape) ── */
    @media (max-height: 500px) and (orientation: landscape) {

      .avatar-name {

  <script>
    // disable right-click
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    // disable F12, Ctrl+Shift+I/J/C/U, Ctrl+U
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') { e.preventDefault(); return; }
      if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c' || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return; }
      if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return; }
    });

<body>

  <!-- video bg -->
  <div class="vid-bg">
    <video id="bgVid" autoplay muted loop playsinline webkit-playsinline x-webkit-airplay="deny" disableRemotePlayback preload="metadata">
      <source src="https://igotyou.lol/video/citycompressed.mp4" type="video/mp4">
      <source src="https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/video/citycompressed.mp4" type="video/mp4">
    </video>
    <div style="position:absolute;inset:0;z-index:1;"></div>
  </div>
  <script>
    (function() {
      var vid = document.getElementById('bgVid');

      function tryPlay() {
        vid.muted = true; // belt-and-suspenders for iOS
        var p = vid.play();
        if (p !== undefined) {
          p.catch(function() {
            // Autoplay blocked — will retry on first touch
          });
        }
      }

      // Try immediately
      tryPlay();

      // Retry on first user touch (covers Low Power Mode and strict autoplay policies)
      function onFirstTouch() {
        if (vid.paused) tryPlay();
        document.removeEventListener('touchstart', onFirstTouch);
        document.removeEventListener('touchend', onFirstTouch);
      }
      document.addEventListener('touchstart', onFirstTouch, { passive: true });
      document.addEventListener('touchend',   onFirstTouch, { passive: true });

      // Retry when tab becomes visible again (e.g. user switches back)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && vid.paused) tryPlay();
      });

      // Retry on orientation change — iOS sometimes kills playback on rotate
      // Use multiple staggered retries since iOS timing is unpredictable
      window.addEventListener('orientationchange', function() {
        [300, 600, 1000, 1600].forEach(function(delay) {
          setTimeout(function() { if (vid.paused) tryPlay(); }, delay);
        });
      });

      // Handle browser suspending/stalling the video (common on mobile when switching apps or rotating)
      vid.addEventListener('suspend', function() {
        setTimeout(function() { if (vid.paused) tryPlay(); }, 200);
      });
      vid.addEventListener('stalled', function() {
        setTimeout(function() { if (vid.paused) tryPlay(); }, 200);
      });


      // If the video errors on first source, let the browser fall through to next source naturally
      vid.addEventListener('error', function() {
        // error on a source — browser will try next <source> automatically
      }, true);

    })();
  </script>

    // ── video: Safari / small-phone fix ──────────────────────
    const bgVid = document.getElementById('bgVid');
    bgVid.setAttribute('playsinline', '');
    bgVid.setAttribute('webkit-playsinline', '');
    bgVid.muted = true;
    bgVid.controls = false;

    function tryPlay() {
      bgVid.muted = true;
      const p = bgVid.play();
      if (p !== undefined) p.catch(() => {});
    }

    // On small/mobile screens the video may stall before it starts —
    // force a load() then play() once the DOM is ready.
    bgVid.load();
    tryPlay();

    // If autoplay is blocked, retry on first user interaction
    function onInteract() {
      if (bgVid.paused) tryPlay();
    }
    document.addEventListener('touchstart', onInteract, { once: true });
    document.addEventListener('click',      onInteract, { once: true });

    // If the video stalls or errors, try the github fallback source directly
    function tryFallback() {
      if (bgVid.src && bgVid.src.includes('github')) return; // already on fallback
      bgVid.src = 'https://raw.githubusercontent.com/newyork482/adgsdaggdsdg/main/video/city.mp4';
      bgVid.load();
      tryPlay();
    }
    bgVid.addEventListener('error',   tryFallback, { once: true });
    bgVid.addEventListener('stalled', () => { setTimeout(tryFallback, 3000); }, { once: true });

    bgVid.addEventListener('loadedmetadata', () => { bgVid.controls = false; tryPlay(); });

    // ── back link ─────────────────────────────────────────────
    try { history.replaceState(null, '', 'https://igotyou.lol'); } catch(e) {}
    document.getElementById('backLink').addEventListener('click', function(e) {
      e.preventDefault();

      setTimeout(() => { window.location.href = 'https://igotyou.lol'; }, 560);
    });

    // ── rain ──────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function newStreak(scatter) {
      const len = 15 + Math.random() * 35;
      return {
        x:     Math.random() * (W + 60) - 30,
        y:     scatter ? Math.random() * H : -len,
        len,
        speed: 6 + Math.random() * 10,
        alpha: 0.03 + Math.random() * 0.1,
        width: 0.4 + Math.random() * 0.7,
      };
    }

    const streaks = Array.from({ length: 140 }, () => newStreak(true));

    function animateRain() {
      ctx.clearRect(0, 0, W, H);
      streaks.forEach(s => {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.strokeStyle = 'rgba(220,190,140,1)';
        ctx.lineWidth = s.width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.len * 0.12, s.y + s.len);
        ctx.stroke();
        ctx.restore();
        s.y += s.speed;
        s.x -= s.speed * 0.12;
        if (s.y - s.len > H || s.x < -60) Object.assign(s, newStreak(false));
      });
      requestAnimationFrame(animateRain);
    }
    animateRain();

      const rect = avatarEl.getBoundingClientRect();
      const pw = el.offsetWidth || 260;
      let left = rect.left + rect.width / 2 - pw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
      const ph = el.offsetHeight || 180;
      const vhMax = window.innerHeight - 8; // never go below viewport
      let top;
      if (rect.top > ph + 16) {
        top = rect.top - ph - 12;
      } else {
        top = rect.bottom + 12;
      }
      // clamp so popup never overflows viewport bottom
      top = Math.min(top, vhMax - ph);
      // clamp so popup never goes above viewport top
      top = Math.max(8, top);
      el.style.top  = top + 'px';
      el.style.left = left + 'px';
    }

    function positionPopup()  { if (window.innerWidth <= 680) return; _positionAny(popup,  avatarMid);       }
    function positionPopup2() { if (window.innerWidth <= 680) return; _positionAny(popup2, avatarKino);      }

    // ── mutual exclusion helper ───────────────────────────────
    function pauseAllExcept(keepAudio) {
      [
        { a: audio,  ip: iconPlay,  ipause: iconPause  },
        { a: audio2, ip: iconPlay2, ipause: iconPause2 },
        { a: audio3, ip: iconPlay3, ipause: iconPause3 },
        { a: audio4, ip: iconPlay4, ipause: iconPause4 },
        { a: audio5, ip: iconPlay5, ipause: iconPause5 },
        { a: audio6, ip: iconPlay6, ipause: iconPause6 },
        { a: audio7, ip: iconPlay7, ipause: iconPause7 },
      ].forEach(({ a, ip, ipause }) => {
        if (a !== keepAudio && !a.paused) {
          a.pause();
          ip.style.display    = 'block';
          ipause.style.display = 'none';
        }
      });
    }

    // ── play / pause ──────────────────────────────────────────
