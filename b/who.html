    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    body.fading {
      opacity: 0;
      transition: opacity 0.55s ease;
    }

    /* ── video background ── */
    .vid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .vid-bg video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.75) contrast(1.1) saturate(0.9);
      pointer-events: none;
    }

    .vid-bg video::-webkit-media-controls,
    .vid-bg video::-webkit-media-controls-enclosure,
    .vid-bg video::-webkit-media-controls-overlay-play-button,
    .vid-bg video::-webkit-media-controls-start-playback-button,
    .vid-bg video::-webkit-media-controls-panel {
      display: none !important;
      -webkit-appearance: none;
      opacity: 0 !important;
    }

    /* fallback gradient */
    .vid-bg {
      background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a14 100%);
    }

    /* ── overlays (softened to match new mood) ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 55%, transparent 30%, rgba(0,0,0,0.5) 100%);
    }

    .fog {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(8,6,12,0.6) 0%,
        rgba(8,6,12,0.1) 40%,
        transparent 70%,
        rgba(0,0,0,0.3) 100%
      );
    }

    /* ── back link ── */
    .back-link {
      position: fixed;
      top: 1.4rem;
      left: 1.6rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(200,170,110,0.7);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding: 0.2rem 0.15rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.4s;
    }

    .back-link:hover {
      color: rgba(230,200,140,0.95);
      border-bottom-color: rgba(200,170,110,0.4);
    }

    @keyframes fadeInUI { to { opacity: 1; } }

    /* ── title ── */
    .title {
      position: fixed;
      top: 1.35rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: rgba(200,170,110,0.5);
      white-space: nowrap;
      opacity: 0;
      animation: fadeInUI 2s ease forwards;
      animation-delay: 0.6s;
    }

    /* ── branding ── */
    .branding {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.26em;
      color: rgba(180,145,85,0.8);
      text-transform: lowercase;
      white-space: nowrap;
      user-select: none;
    }

    /* ── profile row ── */
    .wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.35rem, 1.5vw, 1.2rem);
      flex-wrap: nowrap;
    }

    .profile {
      opacity: 0;
      animation: profileIn 0.8s ease forwards;
      position: relative;
      flex-shrink: 0;
      width: clamp(48px, 13vw, 130px);
      min-width: clamp(48px, 13vw, 130px);
      max-width: clamp(48px, 13vw, 130px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .profile:nth-child(1) { animation-delay: 0.3s; }
    .profile:nth-child(2) { animation-delay: 0.42s; }
    .profile:nth-child(3) { animation-delay: 0.54s; }
    .profile:nth-child(4) { animation-delay: 0.66s; }
    .profile:nth-child(5) { animation-delay: 0.78s; }
    .profile:nth-child(6) { animation-delay: 0.90s; }
    .profile:nth-child(7) { animation-delay: 1.02s; }

    @keyframes profileIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: clamp(48px, 13vw, 130px);
      height: clamp(48px, 13vw, 130px);
      min-width: clamp(48px, 13vw, 130px);
      min-height: clamp(48px, 13vw, 130px);
      border-radius: 4px;
      border: 1px solid rgba(200,160,90,0.3);
      background: rgba(15,12,8,0.5);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    }

    .avatar:hover {
      border-color: rgba(220,180,100,0.6);
      box-shadow: 0 0 20px rgba(200,150,50,0.2);
      transform: translateY(-2px);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .avatar-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(220,185,115,0.95);
      text-align: center;
      text-transform: lowercase;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* player popup base */
    .player-popup {
      position: fixed;
      z-index: 100;
      width: 260px;
      background: rgba(8,6,12,0.94);
      border: 1px solid rgba(200,160,90,0.2);
      border-radius: 6px;
      backdrop-filter: blur(24px);
      padding: 1.2rem;
      pointer-events: all;
      opacity: 0;
      transform: scale(0.93) translateY(10px);
      transition: opacity 0.28s cubic-bezier(.4,0,.2,1), transform 0.28s cubic-bezier(.4,0,.2,1);
    }

    .player-popup.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .player-popup.hidden {
      pointer-events: none;
    }

    .popup-inner {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .popup-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .popup-art {
      width: 46px;
      height: 46px;
      border-radius: 3px;
      object-fit: cover;
      border: 1px solid rgba(200,160,90,0.25);
    }

    .popup-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 0;
    }

    .popup-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(230,205,160,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-artist {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      color: rgba(180,145,85,0.7);
      text-transform: lowercase;
    }

    .popup-progress {
      display: flex;
      flex-direction: column;
      gap: 0.32rem;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(200,160,90,0.15);
      border-radius: 2px;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: rgba(200,160,90,0.6);
      border-radius: 2px;
      width: 0%;
      transition: width 0.25s linear;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
    }

    .progress-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: rgba(180,145,85,0.5);
    }

    .popup-controls {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.35rem;
      color: rgba(200,160,90,0.75);
      transition: color 0.2s, transform 0.15s;
      display: flex;
    }

    .ctrl-btn:hover {
      color: rgba(240,200,130,0.95);
      transform: scale(1.12);
    }

    .popup-vol {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .vol-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: rgba(180,145,85,0.5);
      text-transform: lowercase;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: rgba(200,160,90,0.15);
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(200,160,90,0.8);
      cursor: pointer;
    }

    /* Tablet landscape */
    @media (min-width: 681px) and (max-width: 1100px) {
      .avatar { width: clamp(60px, 9vw, 100px) !important; height: clamp(60px, 9vw, 100px) !important; }
      .row { gap: clamp(0.3rem, 1vw, 0.8rem); }
      .avatar-name { font-size: 0.9rem; letter-spacing: 0.1em; }
    }

    /* MOBILE PORTRAIT */
    @media (max-width: 680px) {
      .wrap { padding: 5rem 1rem 1.8rem; align-items: flex-start; justify-content: flex-start; }
      .row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.9rem 0.6rem;
        width: 100%;
        max-width: 540px;
        margin: 0 auto;
      }
      .profile:last-child:nth-child(3n+1) { grid-column: 2; }
      .profile { gap: 0.35rem; width: 100%; }
      .avatar { width: 100% !important; height: auto !important; aspect-ratio: 1 / 1; position: relative !important; display: block; }
      .avatar img { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; object-fit: cover !important; }
      .avatar-name {
        white-space: nowrap !important;
        font-size: clamp(0.68rem, 3.8vw, 0.95rem);
        letter-spacing: 0.05em;
        font-weight: 600;
      }
      .player-popup {
        width: 100% !important;
        max-width: 100% !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        border-radius: 14px 14px 0 0;
        transform: scale(1) translateY(110%);
        padding: 1.4rem 1.4rem 2rem;
      }
      .player-popup.visible { transform: scale(1) translateY(0); }
    }

    /* Phone landscape */
    @media (max-height: 500px) and (orientation: landscape) {
      .wrap { padding: 2rem 0.8rem 1.4rem; align-items: center; justify-content: center; }
      .row { display: flex; flex-direction: row; gap: clamp(0.25rem, 1vw, 0.55rem) !important; }
      .profile { flex: 1 1 0; min-width: 0; max-width: calc((100% - 6 * 0.55rem) / 7); }
      .avatar { width: 100% !important; height: auto !important; aspect-ratio: 1 / 1 !important; }
      .avatar-name { font-size: clamp(0.55rem, 1.8vw, 0.7rem); white-space: nowrap; }
      .player-popup {
        width: min(280px, 88vw) !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) scale(0.93) !important;
        bottom: auto !important;
      }
      .player-popup.visible { transform: translate(-50%, -50%) scale(1) !important; }
    }
  </style>
  <script>
    // 🔥 FIX: Show root domain in address bar
    history.replaceState(null, '', '/');

    // Redirect to landing page on refresh or direct visit
    (function() {
      const navEntry = performance.getEntriesByType?.('navigation')[0];
      if (navEntry && navEntry.type === 'reload') {
        window.location.href = '/';
        return;
      }
      if (document.referrer === '' && window.location.pathname !== '/') {
        window.location.href = '/';
      }
    })();

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12') { e.preventDefault(); return; }
      if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c' || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return; }
      if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return; }
    });
  </script>

  <script>
    // Video background autoplay robust
    const bgVid = document.getElementById('bgVid');
    bgVid.setAttribute('playsinline', '');
    bgVid.setAttribute('webkit-playsinline', '');
    bgVid.muted = true;
    bgVid.controls = false;
    function tryPlayVid() { bgVid.muted = true; const p = bgVid.play(); if (p !== undefined) p.catch(() => {}); }
    bgVid.load(); tryPlayVid();
    document.addEventListener('touchstart', () => { if (bgVid.paused) tryPlayVid(); }, { once: true });
    document.addEventListener('click', () => { if (bgVid.paused) tryPlayVid(); }, { once: true });
    
    // Format time helper
    function fmt(s) { if (!isFinite(s)) return '—'; return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`; }
    
    // Desktop popup positioning
    function isMobile() { return window.innerWidth <= 680; }
    function isLandscapeMobile() { return window.innerHeight <= 500 && window.innerWidth > window.innerHeight; }
    function positionPopup(popupEl, avatarEl) {
      if (isMobile() || isLandscapeMobile()) return;
      const rect = avatarEl.getBoundingClientRect();
      const pw = popupEl.offsetWidth || 260;
      let left = rect.left + rect.width / 2 - pw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
      const ph = popupEl.offsetHeight || 180;
      let top = (rect.top > ph + 16) ? rect.top - ph - 12 : rect.bottom + 12;
      top = Math.min(Math.max(8, top), window.innerHeight - ph - 8);
      popupEl.style.top = top + 'px';
      popupEl.style.left = left + 'px';
    }
    
    // Audio players data
    const playersData = [
      { audioId: 'trackAudio', popupId: 'playerPopup', avatarId: 'avatarMid', playBtnId: 'playPauseBtn', iconPlayId: null, iconPauseId: null, fillId: 'progressFill', curId: 'timeCurrent', durId: 'timeDuration', trackId: 'progressTrack', volId: 'volSlider' },
      { audioId: 'trackAudio2', popupId: 'playerPopup2', avatarId: 'avatarKino', playBtnId: 'playPauseBtn2', fillId: 'progressFill2', curId: 'timeCurrent2', durId: 'timeDuration2', trackId: 'progressTrack2', volId: 'volSlider2' },
      { audioId: 'trackAudio3', popupId: 'playerPopup3', avatarId: 'avatarSkai', playBtnId: 'playPauseBtn3', fillId: 'progressFill3', curId: 'timeCurrent3', durId: 'timeDuration3', trackId: 'progressTrack3', volId: 'volSlider3' },
      { audioId: 'trackAudio4', popupId: 'playerPopup4', avatarId: 'avatarPachelbel', playBtnId: 'playPauseBtn4', fillId: 'progressFill4', curId: 'timeCurrent4', durId: 'timeDuration4', trackId: 'progressTrack4', volId: 'volSlider4' },
      { audioId: 'trackAudio5', popupId: 'playerPopup5', avatarId: 'avatarUnki', playBtnId: 'playPauseBtn5', fillId: 'progressFill5', curId: 'timeCurrent5', durId: 'timeDuration5', trackId: 'progressTrack5', volId: 'volSlider5' },
      { audioId: 'trackAudio6', popupId: 'playerPopup6', avatarId: 'avatarMetallica', playBtnId: 'playPauseBtn6', fillId: 'progressFill6', curId: 'timeCurrent6', durId: 'timeDuration6', trackId: 'progressTrack6', volId: 'volSlider6' },
      { audioId: 'trackAudio7', popupId: 'playerPopup7', avatarId: 'avatarSinatra', playBtnId: 'playPauseBtn7', fillId: 'progressFill7', curId: 'timeCurrent7', durId: 'timeDuration7', trackId: 'progressTrack7', volId: 'volSlider7' }
    ];
    
    let popupStates = new Array(7).fill(false);
    const audios = playersData.map(p => document.getElementById(p.audioId));
    const popups = playersData.map(p => document.getElementById(p.popupId));
    const avatars = playersData.map(p => document.getElementById(p.avatarId));
    
    function pauseAllExcept(keepAudio) {
      audios.forEach((aud, idx) => {
        if (aud !== keepAudio && !aud.paused) {
          aud.pause();
          const btn = document.getElementById(playersData[idx].playBtnId);
          if (btn) {
            const svgs = btn.querySelectorAll('svg');
            if (svgs[0]) svgs[0].style.display = 'block';
            if (svgs[1]) svgs[1].style.display = 'none';
          }
        }
      });
    }
    
    playersData.forEach((data, idx) => {
      const audio = audios[idx];
      const popup = popups[idx];
      const avatar = avatars[idx];
      const playBtn = document.getElementById(data.playBtnId);
      const fill = document.getElementById(data.fillId);
      const timeCur = document.getElementById(data.curId);
      const timeDur = document.getElementById(data.durId);
      const track = document.getElementById(data.trackId);
      const volSlider = document.getElementById(data.volId);
      
      if (audio) audio.volume = 0.8;
      if (volSlider) volSlider.addEventListener('input', () => { if (audio) audio.volume = parseFloat(volSlider.value); });
      if (playBtn) {
        const svgPlay = playBtn.querySelector('svg:first-of-type');
        const svgPause = playBtn.querySelector('svg:last-of-type');
        playBtn.addEventListener('click', () => {
          if (audio.paused) {
            pauseAllExcept(audio);
            audio.play();
            if (svgPlay) svgPlay.style.display = 'none';
            if (svgPause) svgPause.style.display = 'block';
          } else {
            audio.pause();
            if (svgPlay) svgPlay.style.display = 'block';
            if (svgPause) svgPause.style.display = 'none';
          }
        });
      }
      if (audio) {
        audio.addEventListener('timeupdate', () => {
          if (audio.duration && fill) fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
          if (timeCur) timeCur.textContent = fmt(audio.currentTime);
        });
        audio.addEventListener('loadedmetadata', () => { if (timeDur) timeDur.textContent = fmt(audio.duration); });
      }
      if (track && audio) {
        track.addEventListener('click', e => { const rect = track.getBoundingClientRect(); audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; });
      }
      
      if (avatar && popup) {
        avatar.addEventListener('click', (e) => {
          e.stopPropagation();
          for (let i = 0; i < popups.length; i++) {
            if (i !== idx && popupStates[i]) {
              popups[i].classList.remove('visible');
              setTimeout(() => popups[i].classList.add('hidden'), 300);
              popupStates[i] = false;
            }
          }
          if (popupStates[idx]) {
            popup.classList.remove('visible');
            setTimeout(() => popup.classList.add('hidden'), 300);
            popupStates[idx] = false;
          } else {
            popup.classList.remove('hidden');
            if (!isMobile() && !isLandscapeMobile()) positionPopup(popup, avatar);
            popup.getBoundingClientRect();
            popup.classList.add('visible');
            popupStates[idx] = true;
          }
        });
      }
    });
    
    document.addEventListener('click', (e) => {
      for (let i = 0; i < popups.length; i++) {
        const pop = popups[i];
        if (popupStates[i] && pop && !pop.contains(e.target)) {
          pop.classList.remove('visible');
          setTimeout(() => pop.classList.add('hidden'), 300);
          popupStates[i] = false;
        }
      }
    });
    popups.forEach(pop => { if (pop) pop.addEventListener('click', e => e.stopPropagation()); });
    
    window.addEventListener('resize', () => {
      if (!isMobile() && !isLandscapeMobile()) {
        for (let i = 0; i < popups.length; i++) {
          if (popupStates[i]) positionPopup(popups[i], avatars[i]);
        }
      }
    });
  </script>
